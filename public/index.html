<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Turbo Racer 3D – A modern browser-based 3D car racing game with multiple stages, AI opponents, and stunning environments." />
  <meta name="theme-color" content="#00d4ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="version" content="2" />
  <title>Turbo Racer 3D | Ultimate Racing Experience</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-512.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- ═══════════ GAME CANVAS ═══════════ -->
<canvas id="game-canvas"></canvas>

<!-- ═══════════ HUD (in-game overlay) ═══════════ -->
<div id="hud"></div>

<!-- ═══════════ PAUSE BUTTON ═══════════ -->
<button id="btn-pause">⏸ PAUSE</button>

<!-- ═══════════ TOUCH CONTROLS ═══════════ -->
<div id="touch-controls">
  <div class="touch-left">
    <button class="touch-btn" id="btn-left">◀</button>
    <button class="touch-btn" id="btn-nitro">⚡<br><span style="font-size:0.5rem;font-family:'Orbitron',monospace;letter-spacing:0.1em;">NITRO</span></button>
  </div>
  <div class="touch-right">
    <button class="touch-btn" id="btn-brake">🛑<br><span style="font-size:0.5rem;font-family:'Orbitron',monospace;letter-spacing:0.1em;">BRAKE</span></button>
    <button class="touch-btn" id="btn-right">▶</button>
  </div>
</div>

<!-- ═══════════ LOADING SCREEN ═══════════ -->
<div class="screen active" id="screen-loading">
  <div class="loading-logo">TURBO<br>RACER</div>
  <div class="loading-subtitle">3D RACING EXPERIENCE</div>
  <div style="font-family:'Orbitron',monospace;font-size:clamp(0.6rem,1.5vw,0.8rem);color:rgba(255,255,255,0.25);letter-spacing:0.25em;margin-bottom:1.5rem;">ALEXZZY GAME</div>
  <div class="loading-spinner"></div>
  <div class="loading-bar-wrap"><div id="loading-progress"></div></div>
  <div class="loading-tip">Loading world assets...</div>
</div>

<!-- ═══════════ HOME SCREEN ═══════════ -->
<div class="screen" id="screen-home">
  <div class="home-bg-glow"></div>
  <div class="home-header">
    <div class="home-header-logo">⚡ TURBO RACER 3D</div>
    <div class="home-header-actions">
      <span id="home-user-display"></span>
      <span id="home-coins"></span>
      <button class="btn-icon" id="btn-mute" title="Toggle Sound">🔊</button>
      <button class="btn-icon" id="btn-login" title="Login">👤</button>
      <button class="btn-icon" id="btn-logout" style="display:none;" title="Logout">🚪</button>
    </div>
  </div>

  <div class="home-content">
    <div class="home-title">TURBO<br>RACER</div>
    <div class="home-sub">Ultimate 3D Racing</div>

    <!-- Animated car preview -->
    <div class="home-car-preview">
      <svg class="home-car-svg" viewBox="0 0 320 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Road -->
        <rect x="0" y="110" width="320" height="50" rx="4" fill="#1a1a2a"/>
        <rect x="0" y="108" width="320" height="4" fill="#333"/>
        <!-- Lane marks -->
        <rect x="85" y="125" width="40" height="6" rx="3" fill="rgba(255,255,255,0.3)">
          <animateTransform attributeName="transform" type="translate" values="0,0;-30,0" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="165" y="125" width="40" height="6" rx="3" fill="rgba(255,255,255,0.3)">
          <animateTransform attributeName="transform" type="translate" values="0,0;-30,0" dur="0.6s" begin="0.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="245" y="125" width="40" height="6" rx="3" fill="rgba(255,255,255,0.3)">
          <animateTransform attributeName="transform" type="translate" values="0,0;-30,0" dur="0.6s" begin="0.4s" repeatCount="indefinite"/>
        </rect>
        <!-- Car body -->
        <g transform="translate(110,60)">
          <animateTransform attributeName="transform" type="translate" values="110,60;110,57;110,60" dur="1.8s" repeatCount="indefinite"/>
          <!-- Shadow -->
          <ellipse cx="50" cy="52" rx="45" ry="7" fill="rgba(0,0,0,0.4)"/>
          <!-- Wheels -->
          <circle cx="18" cy="48" r="12" fill="#111" stroke="#333" stroke-width="2"/>
          <circle cx="18" cy="48" r="6" fill="#666"/>
          <circle cx="82" cy="48" r="12" fill="#111" stroke="#333" stroke-width="2"/>
          <circle cx="82" cy="48" r="6" fill="#666"/>
          <!-- Body -->
          <rect x="4" y="28" width="92" height="22" rx="5" fill="#cc2200"/>
          <rect x="16" y="10" width="64" height="22" rx="8" fill="#dd3311"/>
          <!-- Windshield -->
          <rect x="24" y="13" width="48" height="16" rx="4" fill="rgba(100,200,255,0.5)"/>
          <!-- Headlights -->
          <rect x="90" y="32" width="6" height="8" rx="2" fill="#ffffaa"/>
          <rect x="90" y="32" width="6" height="8" rx="2" fill="#ffffaa" filter="url(#glow)"/>
          <!-- Taillights -->
          <rect x="4" y="32" width="5" height="8" rx="2" fill="#ff2200"/>
          <!-- Nitro trail -->
          <ellipse cx="-4" cy="38" rx="10" ry="4" fill="rgba(0,150,255,0.5)">
            <animate attributeName="rx" values="6;14;6" dur="0.3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.3s" repeatCount="indefinite"/>
          </ellipse>
        </g>
        <!-- Speed lines -->
        <line x1="10" y1="75" x2="80" y2="75" stroke="rgba(0,212,255,0.3)" stroke-width="2" stroke-dasharray="8,6">
          <animateTransform attributeName="transform" type="translate" values="0,0;-20,0;0,0" dur="0.5s" repeatCount="indefinite"/>
        </line>
        <line x1="20" y1="85" x2="75" y2="85" stroke="rgba(0,212,255,0.2)" stroke-width="1.5" stroke-dasharray="6,8">
          <animateTransform attributeName="transform" type="translate" values="0,0;-15,0;0,0" dur="0.4s" repeatCount="indefinite"/>
        </line>
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
      </svg>
    </div>

    <div class="home-buttons">
      <button class="btn-primary" id="btn-play" style="font-size:1.1rem;padding:1.1rem;">
        🏁 RACE NOW
      </button>
      <button class="btn-secondary" id="btn-garage">🔧 GARAGE & UPGRADES</button>
      <button class="btn-secondary" id="btn-leaderboard">🏆 LEADERBOARD</button>
    </div>
    <div style="font-family:'Orbitron',monospace;font-size:clamp(0.55rem,1.2vw,0.7rem);color:rgba(255,255,255,0.2);letter-spacing:0.25em;margin-top:2rem;">ALEXZZY SILAS</div>
  </div>
</div>

<!-- ═══════════ AUTH SCREEN ═══════════ -->
<div class="screen" id="screen-auth">
  <div class="auth-box">
    <div class="auth-title">🔑 SIGN IN</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login">LOGIN</div>
      <div class="auth-tab" id="tab-register">REGISTER</div>
    </div>

    <form class="auth-form" id="form-login" style="display:flex;">
      <input type="email" id="login-email" placeholder="Email address" required autocomplete="email" />
      <input type="password" id="login-pass" placeholder="Password" required autocomplete="current-password" />
      <div id="auth-msg"></div>
      <button type="submit" class="btn-primary">LOGIN</button>
    </form>

    <form class="auth-form" id="form-register" style="display:none;">
      <input type="text" id="reg-user" placeholder="Username (min 3 chars)" required minlength="3" autocomplete="username" />
      <input type="email" id="reg-email" placeholder="Email address" required autocomplete="email" />
      <input type="password" id="reg-pass" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password" />
      <div id="auth-msg-reg"></div>
      <button type="submit" class="btn-primary">CREATE ACCOUNT</button>
    </form>

    <div class="auth-divider">— or —</div>
    <button class="btn-secondary" id="btn-guest">⚡ PLAY AS GUEST</button>
    <div class="auth-back">
      <button id="btn-back-auth">← Back to Home</button>
    </div>
  </div>
</div>

<!-- ═══════════ STAGE SELECT ═══════════ -->
<div class="inner-screen screen" id="screen-stage-select">
  <div class="screen-header">
    <button class="btn-back" id="btn-back-stages">←</button>
    <h2>🏁 SELECT STAGE</h2>
  </div>
  <div id="stages-grid"></div>
</div>

<!-- ═══════════ CAR SELECT ═══════════ -->
<div class="inner-screen screen" id="screen-car-select">
  <div class="screen-header">
    <button class="btn-back" id="btn-back-cars">←</button>
    <h2>🚗 SELECT CAR</h2>
  </div>
  <div id="cars-grid"></div>
  <div class="car-select-actions">
    <button class="btn-secondary" id="btn-back-cars-2" onclick="document.getElementById('btn-back-cars').click()">← Back</button>
    <button class="btn-primary btn-green" id="btn-start-race" style="flex:1;">🏁 START RACE</button>
  </div>
</div>

<!-- ═══════════ GARAGE ═══════════ -->
<div class="inner-screen screen" id="screen-garage">
  <div class="screen-header">
    <button class="btn-back" id="btn-back-garage">←</button>
    <h2>🔧 GARAGE</h2>
  </div>
  <div id="garage-container"></div>
</div>

<!-- ═══════════ LEADERBOARD ═══════════ -->
<div class="inner-screen screen" id="screen-leaderboard">
  <div class="screen-header">
    <button class="btn-back" id="btn-back-lb">←</button>
    <h2>🏆 LEADERBOARD</h2>
  </div>
  <div id="leaderboard-list"></div>
</div>

<!-- ═══════════ RACE RESULTS ═══════════ -->
<div class="screen" id="screen-results" style="background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);">
  <div id="results-content"></div>
  <div class="results-actions" style="width:min(420px,92vw);padding:0 2rem 2rem;display:flex;flex-direction:column;gap:0.65rem;margin-top:1rem;">
    <button class="btn-primary btn-gold" id="btn-next-stage">⏩ NEXT STAGE</button>
    <button class="btn-primary" id="btn-retry-stage">🔄 RETRY</button>
    <button class="btn-secondary" id="btn-results-home">🏠 MAIN MENU</button>
  </div>
</div>

<!-- ═══════════ PAUSE SCREEN ═══════════ -->
<div class="screen" id="screen-pause" style="background:rgba(0,0,0,0.75);backdrop-filter:blur(12px);">
  <div class="pause-box">
    <div class="pause-title">⏸ PAUSED</div>
    <div class="pause-actions">
      <button class="btn-primary btn-green" id="btn-resume">▶ RESUME</button>
      <button class="btn-secondary" id="btn-quit-race">🏠 QUIT RACE</button>
    </div>
  </div>
</div>

<!-- ═══════════ LOADING FAILSAFE ═══════════ -->
<script>
window._gameLoadReady = false;
window.addEventListener('error', function(e) { document.getElementById('screen-loading').innerHTML = '<div style="text-align:center;padding:2rem;"><div style="font-size:2.5rem;margin-bottom:1rem;">💥</div><div style="font-family:Orbitron,monospace;font-size:clamp(0.9rem,2.5vw,1.1rem);color:#ff4444;margin-bottom:0.5rem;">Script Error</div><div style="color:rgba(255,255,255,0.4);font-size:clamp(0.7rem,2vw,0.8rem);margin-bottom:1.5rem;">' + (e.message||'Unknown error') + '</div><button onclick="location.reload()" style="padding:0.65rem 1.8rem;background:linear-gradient(135deg,#00d4ff,#0066cc);border:none;border-radius:10px;color:#fff;font-family:Orbitron,monospace;font-size:0.8rem;cursor:pointer;">⟳ RETRY</button></div>'; }, true);
window._clearLoadTimer = ()=>{ clearTimeout(window._loadFailTimer); window._loadFailTimer = null; };
window._loadFailTimer = setTimeout(()=>{
  const el = document.getElementById('screen-loading');
  if (!el || !el.classList.contains('active')) return;
  el.innerHTML = `
    <div style="text-align:center;padding:2rem;">
      <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
      <div style="font-family:'Orbitron',monospace;font-size:clamp(1rem,3vw,1.3rem);color:#fff;margin-bottom:0.5rem;">Connection Lost</div>
      <div style="color:rgba(255,255,255,0.45);font-size:clamp(0.72rem,2vw,0.85rem);margin-bottom:2rem;line-height:1.5;">
        Could not load game assets.<br>Check your network and try again.
      </div>
      <button onclick="location.reload()" style="padding:0.75rem 2rem;background:linear-gradient(135deg,#00d4ff,#0066cc);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:0.85rem;cursor:pointer;transition:transform 0.15s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">⟳ RETRY</button>
    </div>
  `;
}, 8000);
</script>

<!-- ═══════════ IMPORT MAP ═══════════ -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js"
  }
}
</script>

<!-- ═══════════ INSTALL APP PROMPT ═══════════ -->
<div id="install-prompt" style="display:none;position:fixed;bottom:1rem;left:1rem;right:1rem;z-index:999;background:rgba(5,5,20,0.95);backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,0.3);border-radius:16px;padding:1rem 1.25rem;align-items:center;justify-content:space-between;gap:1rem;box-shadow:0 8px 40px rgba(0,0,0,0.6);">
  <div style="display:flex;align-items:center;gap:0.75rem;flex:1;">
    <div style="width:44px;height:44px;background:linear-gradient(135deg,#00d4ff,#00ff88);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;">🏁</div>
    <div>
      <div style="font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:700;color:#fff;">Install Turbo Racer</div>
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.5);">Add to home screen for the full experience</div>
    </div>
  </div>
  <div style="display:flex;gap:0.5rem;flex-shrink:0;">
    <button id="btn-install" style="padding:0.5rem 1.2rem;background:linear-gradient(135deg,#00d4ff,#0066cc);border:none;border-radius:10px;color:#fff;font-family:'Orbitron',monospace;font-size:0.72rem;font-weight:700;cursor:pointer;letter-spacing:0.08em;">INSTALL</button>
    <button id="btn-install-close" style="padding:0.5rem 0.7rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:0.85rem;cursor:pointer;">✕</button>
  </div>
</div>

<script>
// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const el = document.getElementById('install-prompt');
  if (el) el.style.display = 'flex';
});

document.getElementById('btn-install')?.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const result = await deferredPrompt.userChoice;
    if (result.outcome === 'accepted') {
      document.getElementById('install-prompt').style.display = 'none';
    }
    deferredPrompt = null;
  }
});

document.getElementById('btn-install-close')?.addEventListener('click', () => {
  document.getElementById('install-prompt').style.display = 'none';
});

// Service worker – force update on reload
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js?v=' + document.querySelector('meta[name=version]')?.content || Date.now()).then(reg => {
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          newSW.postMessage('skip');
        }
      });
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
</script>

<!-- ═══════════ SCRIPTS ═══════════ -->
<script type="module" src="/js/main.js"></script>
</body>
</html>
